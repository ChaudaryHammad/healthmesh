<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0C10" />
    <title>Offline — Health Mesh</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0a0c10;
        color: #f2f3f5;
      }
      .card {
        width: min(28rem, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 28px 24px;
        background: #121a2b;
      }
      .mark {
        display: flex;
        gap: 4px;
        height: 22px;
        margin-bottom: 18px;
      }
      .mark span {
        width: 5px;
        border-radius: 2px;
        background: #fff;
      }
      .mark span:last-child {
        width: 3px;
        opacity: 0.35;
      }
      h1 {
        margin: 0;
        font-size: 1.35rem;
        letter-spacing: -0.03em;
      }
      p {
        margin: 10px 0 0;
        color: rgba(255, 255, 255, 0.62);
        line-height: 1.5;
        font-size: 0.95rem;
      }
      button {
        margin-top: 20px;
        height: 40px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: #fff;
        color: #0a0c10;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <h1>You’re offline</h1>
      <p>
        Health Mesh can’t reach the network right now. Check your connection, then
        try again.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
