# Hobby-compatible uptime runner.
# Vercel Hobby crons can only run once per day, so frequent checks go through this Action.
# Requires repo secrets: APP_URL, CRON_SECRET
name: Uptime checks

on:
  schedule:
    # Every 5 minutes (GitHub's practical minimum for scheduled workflows)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Run due uptime checks
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_URL or CRON_SECRET secrets"
            exit 1
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/uptime-checks"
